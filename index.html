<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <title>Webcam AR Tanpa Marker</title>

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }

    #app {
      position: fixed;
      inset: 0;
      overflow: hidden;
    }

    #cameraFeed {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      background: #111;
    }

    #threeLayer {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: auto;
      touch-action: none;
    }

    #info {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 15px;
      border-radius: 5px;
      z-index: 10;
      font-size: 14px;
      max-width: 360px;
    }

    .hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 14px;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 5px;
      z-index: 10;
      font-size: 13px;
    }

    #startBtn {
      position: fixed;
      right: 12px;
      top: 12px;
      z-index: 11;
      border: none;
      border-radius: 8px;
      background: #12a150;
      color: #fff;
      padding: 10px 12px;
      font-weight: 600;
      cursor: pointer;
    }

    #startBtn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #resetBtn {
      position: fixed;
      right: 12px;
      top: 56px;
      z-index: 11;
      border: none;
      border-radius: 8px;
      background: #3367d6;
      color: #fff;
      padding: 10px 12px;
      font-weight: 600;
      cursor: pointer;
    }

    #resetBtn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
  </style>

  <script src="https://unpkg.com/three@0.126.0/build/three.js"></script>
  <script src="https://unpkg.com/three@0.126.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

<div id="app">
  <video id="cameraFeed" autoplay playsinline muted></video>
  <div id="threeLayer"></div>
</div>

<button id="startBtn">Start Kamera</button>
<button id="resetBtn" disabled>Reset Model</button>

<div id="overlay">
  <div id="info">
    <div>AR Webcam (Tanpa Marker)</div>
    <div id="status">Status: Klik Start Kamera.</div>
    <div style="margin-top: 8px; opacity: 0.9;">Model 3D akan langsung tampil di atas feed kamera laptop.</div>
  </div>
  <div class="hint">Interaksi: drag model untuk geser, scroll/pinch untuk zoom, tombol Reset untuk posisi awal.</div>
</div>

<script>
  const statusEl = document.getElementById('status');
  const startBtn = document.getElementById('startBtn');
  const resetBtn = document.getElementById('resetBtn');
  const videoEl = document.getElementById('cameraFeed');
  const layerEl = document.getElementById('threeLayer');

  let renderer;
  let scene;
  let camera;
  let model;
  let modelBaseScale = 0.75;
  let isDragging = false;
  let lastX = 0;
  let lastY = 0;
  let pinchStartDistance = 0;
  let pinchStartScale = 0;

  function clamp(val, min, max) {
    return Math.max(min, Math.min(max, val));
  }

  function setModelScale(newScale) {
    if (!model) {
      return;
    }

    const scale = clamp(newScale, 0.2, 2.5);
    model.scale.set(scale, scale, scale);
  }

  function resetModelTransform() {
    if (!model) {
      return;
    }

    model.position.set(0, -0.75, 0);
    model.rotation.set(0, 0, 0);
    setModelScale(modelBaseScale);
    setStatus('Model di-reset ke posisi awal.');
  }

  function distanceBetweenTouches(t1, t2) {
    const dx = t1.clientX - t2.clientX;
    const dy = t1.clientY - t2.clientY;
    return Math.hypot(dx, dy);
  }

  function setupInteractions() {
    const canvas = renderer.domElement;

    canvas.addEventListener('mousedown', (event) => {
      if (!model) {
        return;
      }
      isDragging = true;
      lastX = event.clientX;
      lastY = event.clientY;
    });

    window.addEventListener('mousemove', (event) => {
      if (!isDragging || !model) {
        return;
      }

      const dx = event.clientX - lastX;
      const dy = event.clientY - lastY;
      lastX = event.clientX;
      lastY = event.clientY;

      model.position.x += dx * 0.0035;
      model.position.y -= dy * 0.0035;
    });

    window.addEventListener('mouseup', () => {
      isDragging = false;
    });

    canvas.addEventListener('wheel', (event) => {
      if (!model) {
        return;
      }
      event.preventDefault();
      const currentScale = model.scale.x;
      const zoomDelta = event.deltaY * -0.0012;
      setModelScale(currentScale + zoomDelta);
    }, { passive: false });

    canvas.addEventListener('touchstart', (event) => {
      if (!model) {
        return;
      }

      if (event.touches.length === 1) {
        isDragging = true;
        lastX = event.touches[0].clientX;
        lastY = event.touches[0].clientY;
      }

      if (event.touches.length === 2) {
        isDragging = false;
        pinchStartDistance = distanceBetweenTouches(event.touches[0], event.touches[1]);
        pinchStartScale = model.scale.x;
      }
    }, { passive: false });

    canvas.addEventListener('touchmove', (event) => {
      if (!model) {
        return;
      }

      event.preventDefault();

      if (event.touches.length === 1 && isDragging) {
        const x = event.touches[0].clientX;
        const y = event.touches[0].clientY;
        const dx = x - lastX;
        const dy = y - lastY;
        lastX = x;
        lastY = y;

        model.position.x += dx * 0.0035;
        model.position.y -= dy * 0.0035;
      }

      if (event.touches.length === 2 && pinchStartDistance > 0) {
        const dist = distanceBetweenTouches(event.touches[0], event.touches[1]);
        const ratio = dist / pinchStartDistance;
        setModelScale(pinchStartScale * ratio);
      }
    }, { passive: false });

    canvas.addEventListener('touchend', (event) => {
      if (event.touches.length === 0) {
        isDragging = false;
      }
      if (event.touches.length < 2) {
        pinchStartDistance = 0;
      }
    });
  }

  function setStatus(text) {
    statusEl.textContent = 'Status: ' + text;
  }

  async function startCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        width: { ideal: 1280 },
        height: { ideal: 720 },
        facingMode: 'user'
      },
      audio: false
    });

    videoEl.srcObject = stream;
    await videoEl.play();
  }

  function initThree() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 3.2);

    const ambient = new THREE.AmbientLight(0xffffff, 0.95);
    scene.add(ambient);

    const key = new THREE.DirectionalLight(0xffffff, 0.8);
    key.position.set(2, 3, 4);
    scene.add(key);

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x000000, 0);
    layerEl.innerHTML = '';
    layerEl.appendChild(renderer.domElement);

    const loader = new THREE.GLTFLoader();
    loader.load(
      'https://raw.githubusercontent.com/mohraihan00/ar_3d_model/main/woody_-_disney_magic_kingdoms.glb',
      (gltf) => {
        model = gltf.scene;
        model.position.set(0, -0.75, 0);
        modelBaseScale = 0.75;
        model.scale.set(modelBaseScale, modelBaseScale, modelBaseScale);
        scene.add(model);
        resetBtn.disabled = false;
        setStatus('Model muncul. Drag untuk geser, scroll/pinch untuk zoom.');
      },
      undefined,
      (err) => {
        console.error(err);
        setStatus('Gagal load model 3D.');
      }
    );

    animate();
    setupInteractions();
  }

  function animate() {
    requestAnimationFrame(animate);

    renderer.render(scene, camera);
  }

  function onResize() {
    if (!renderer || !camera) {
      return;
    }
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  }

  startBtn.addEventListener('click', async () => {
    startBtn.disabled = true;
    setStatus('Meminta izin kamera...');
    try {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        throw new Error('Browser tidak mendukung akses kamera.');
      }

      await startCamera();
      initThree();
      setStatus('Kamera aktif, menyiapkan model 3D...');
    } catch (error) {
      console.error(error);
      setStatus('Gagal akses kamera: ' + error.message);
      startBtn.disabled = false;
    }
  });

  resetBtn.addEventListener('click', () => {
    resetModelTransform();
  });

  window.addEventListener('resize', onResize);
</script>
</body>
</html>
