<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <title>Hello WebXR - AR dengan 3D Model!</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      overflow: hidden;
      background: #000;
    }
    html, body {
      width: 100%;
      height: 100%;
    }
    canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
    }
    #info {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 15px;
      border-radius: 5px;
      z-index: 100;
      font-size: 14px;
    }
    button {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 15px 30px;
      font-size: 16px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      z-index: 100;
    }
    button:hover {
      background: #0056b3;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
  </style>

  <!-- three.js -->
  <script src="https://unpkg.com/three@0.126.0/build/three.js"></script>
  <!-- GLTFLoader untuk load 3D Model -->
  <script src="https://unpkg.com/three@0.126.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

<!-- Info Panel -->
<div id="info">
  <div>WebXR AR Demo</div>
  <div id="status">Status: Ready</div>
</div>

<!-- Tombol untuk mengaktifkan AR -->
<button id="xrButton" onclick="activateXR()">Start AR</button>

<script>
let renderer;
let scene;
let camera;
let reticle;
let modelTemplate;
let hitTestSource = null;
let hitTestSourceRequested = false;

async function activateXR() {
  const xrButton = document.getElementById('xrButton');
  xrButton.disabled = true;

  if (!window.isSecureContext) {
    updateStatus("WebXR wajib HTTPS");
    xrButton.disabled = false;
    return;
  }

  if (!navigator.xr) {
    updateStatus("WebXR tidak didukung browser ini");
    xrButton.disabled = false;
    return;
  }

  try {
    updateStatus("Menyiapkan scene AR...");

    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera();

    const hemiLight = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1.2);
    hemiLight.position.set(0.5, 1, 0.25);
    scene.add(hemiLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
    dirLight.position.set(2, 4, 2);
    scene.add(dirLight);

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true;
    renderer.outputEncoding = THREE.sRGBEncoding;
    renderer.domElement.style.position = 'fixed';
    renderer.domElement.style.inset = '0';
    renderer.domElement.style.zIndex = '0';
    document.body.appendChild(renderer.domElement);

    const loader = new THREE.GLTFLoader();

    loader.load(
      "https://immersive-web.github.io/webxr-samples/media/gltf/reticle/reticle.gltf",
      function(gltf) {
        reticle = gltf.scene;
        reticle.visible = false;
        reticle.matrixAutoUpdate = false;
        scene.add(reticle);
        updateStatus("Reticle siap");
      },
      undefined,
      function(error) {
        console.error(error);
        updateStatus("Gagal load reticle");
      }
    );

    loader.load(
      "https://raw.githubusercontent.com/mohraihan00/ar_3d_model/main/woody_-_disney_magic_kingdoms.glb",
      function(gltf) {
        modelTemplate = gltf.scene;
        modelTemplate.scale.set(0.2, 0.2, 0.2);
        updateStatus("Model AR siap. Tekan Start AR.");
      },
      undefined,
      function(error) {
        console.error(error);
        updateStatus("Gagal load model AR");
      }
    );

    const session = await navigator.xr.requestSession('immersive-ar', {
      requiredFeatures: ['hit-test'],
      optionalFeatures: ['dom-overlay'],
      domOverlay: { root: document.body }
    });

    const blend = session.environmentBlendMode || 'unknown';
    if (blend === 'opaque') {
      updateStatus("Mode perangkat opaque (kamera tidak tersedia). Cek ARCore/browser.");
    } else {
      updateStatus("AR aktif. Arahkan ke lantai/meja.");
    }

    session.addEventListener('end', function() {
      hitTestSourceRequested = false;
      hitTestSource = null;
      xrButton.disabled = false;
      updateStatus("AR session selesai");
      if (renderer && renderer.domElement && renderer.domElement.parentNode) {
        renderer.domElement.parentNode.removeChild(renderer.domElement);
      }
    });

    await renderer.xr.setSession(session);

    const controller = renderer.xr.getController(0);
    controller.addEventListener('select', function() {
      if (!reticle || !reticle.visible || !modelTemplate) {
        return;
      }

      const clone = modelTemplate.clone(true);
      reticle.matrix.decompose(clone.position, clone.quaternion, clone.scale);
      clone.scale.multiplyScalar(0.2);
      scene.add(clone);
      updateStatus("Model ditaruh. Tap lagi untuk menambah.");
    });
    scene.add(controller);

    renderer.setAnimationLoop(renderAR);

    window.addEventListener('resize', onWindowResize);
  } catch (error) {
    console.error(error);
    updateStatus("Gagal start AR: " + error.message);
    xrButton.disabled = false;
    if (renderer && renderer.domElement && renderer.domElement.parentNode) {
      renderer.domElement.parentNode.removeChild(renderer.domElement);
    }
  }
}

function renderAR(timestamp, frame) {
  if (frame) {
    const session = renderer.xr.getSession();
    const referenceSpace = renderer.xr.getReferenceSpace();

    if (!hitTestSourceRequested) {
      session.requestReferenceSpace('viewer').then(function(viewerSpace) {
        session.requestHitTestSource({ space: viewerSpace }).then(function(source) {
          hitTestSource = source;
        });
      });

      session.addEventListener('end', function() {
        hitTestSourceRequested = false;
        hitTestSource = null;
      });

      hitTestSourceRequested = true;
    }

    if (hitTestSource && reticle) {
      const hitTestResults = frame.getHitTestResults(hitTestSource);
      if (hitTestResults.length > 0) {
        const hit = hitTestResults[0];
        const pose = hit.getPose(referenceSpace);
        reticle.visible = true;
        reticle.matrix.fromArray(pose.transform.matrix);
      } else {
        reticle.visible = false;
      }
    }
  }

  renderer.render(scene, camera);
}

function onWindowResize() {
  if (!renderer || !camera) {
    return;
  }

  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// ============================================================
// Helper Function
// ============================================================
function updateStatus(text) {
  document.getElementById('status').textContent = 'Status: ' + text;
}

// Check WebXR Support
if (navigator.xr) {
  navigator.xr.isSessionSupported('immersive-ar').then((supported) => {
    if (!supported) {
      document.getElementById('xrButton').disabled = true;
      updateStatus("AR tidak didukung di device ini");
    }
  });
} else {
  document.getElementById('xrButton').disabled = true;
  updateStatus("WebXR tidak didukung");
}
</script>
</body>
</html>
