<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <title>AR Marker Demo (Laptop Webcam)</title>

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }

    #overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    #info {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 15px;
      border-radius: 5px;
      z-index: 100;
      font-size: 14px;
      max-width: 320px;
    }

    .hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 14px;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 5px;
      z-index: 100;
      font-size: 13px;
    }
  </style>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.min.js"></script>
</head>
<body>

<div id="overlay">
  <div id="info">
    <div>AR Demo (Laptop Friendly)</div>
    <div id="status">Status: Meminta izin kamera...</div>
    <div style="margin-top: 8px; opacity: 0.9;">Arahkan kamera ke marker Hiro untuk menampilkan model 3D.</div>
  </div>
  <div class="hint">Gunakan marker Hiro: https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/HIRO.jpg</div>
</div>

<a-scene
  vr-mode-ui="enabled: false"
  embedded
  renderer="logarithmicDepthBuffer: true; antialias: true; alpha: true;"
  arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;">

  <a-assets>
    <a-asset-item
      id="model3d"
      src="https://raw.githubusercontent.com/mohraihan00/ar_3d_model/main/woody_-_disney_magic_kingdoms.glb"></a-asset-item>
  </a-assets>

  <a-marker preset="hiro">
    <a-entity
      id="arModel"
      gltf-model="#model3d"
      position="0 0 0"
      rotation="0 0 0"
      scale="0.2 0.2 0.2"></a-entity>
  </a-marker>

  <a-entity camera></a-entity>
</a-scene>

<script>
  const statusEl = document.getElementById('status');
  const sceneEl = document.querySelector('a-scene');
  const markerEl = document.querySelector('a-marker');
  const modelEl = document.getElementById('arModel');

  sceneEl.addEventListener('loaded', () => {
    statusEl.textContent = 'Status: Kamera aktif, cari marker Hiro...';
  });

  markerEl.addEventListener('markerFound', () => {
    statusEl.textContent = 'Status: Marker terdeteksi, model tampil.';
  });

  markerEl.addEventListener('markerLost', () => {
    statusEl.textContent = 'Status: Marker hilang, arahkan ulang ke Hiro.';
  });

  modelEl.addEventListener('model-loaded', () => {
    statusEl.textContent = 'Status: Model 3D loaded, cari marker Hiro.';
  });

  modelEl.addEventListener('model-error', () => {
    statusEl.textContent = 'Status: Gagal load model 3D.';
  });

  setTimeout(() => {
    if (statusEl.textContent.includes('Meminta izin kamera')) {
      statusEl.textContent = 'Status: Jika kamera belum aktif, izinkan akses kamera di browser.';
    }
  }, 5000);
</script>
</body>
</html>
